<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obrigado!</title>

  <!-- Seu CSS compilado do Tailwind -->
  <link rel="stylesheet" href="/src/style.css">
</head>

<img src="/src/assets/img/l-elegance.png" alt="">

<body class="flex items-center justify-center min-h-screen">

  <div class="text-center max-w-md px-6">

    <!-- Ícone -->
    <div class="mb-8 animate-float">
      <div class="w-20 h-20 mx-auto flex items-center justify-center rounded-full bg-primary/20 box-glow">
        <svg class="w-10 h-10 text-primary" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
    </div>

    <!-- Título -->
    <h1 class="text-3xl mb-3 animate-shine">
      Mensagem enviada!
    </h1>

    <!-- Texto -->
    <p class="text-gray-300 mb-8">
      Obrigado pelo contato. Em breve retorno para você.
    </p>

    <!-- Botão -->
    <a href="/"
       class="inline-block px-8 py-3 rounded-lg font-semibold text-black bg-primary box-glow-hover transition">
      Voltar para o início
    </a>

  </div>

  <!-- Auto redirect opcional -->
  <script>
    setTimeout(() => {
      window.location.href = "/";
    }, 5000);
  </script>

</body>
</html>
